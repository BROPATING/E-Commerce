<div class="admin-layout">

  <!-- Mobile overlay -->
  <div class="sidebar-overlay"
       [class.overlay-visible]="sidebarOpen"
       (click)="sidebarOpen = false">
  </div>

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="admin-sidebar" [class.sidebar-open]="sidebarOpen">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-mark">
        <span class="brand-diamond">◈</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">ShopNow</span>
        <span class="brand-role">Admin Panel</span>
      </div>
      <button class="sidebar-close" (click)="sidebarOpen = false"
              aria-label="Close menu">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Nav label -->
    <p class="nav-label">Navigation</p>

    <!-- Main nav -->
    <nav class="admin-nav">

      <a routerLink="products"
         routerLinkActive="active"
         class="nav-item"
         (click)="sidebarOpen = false">
        <div class="nav-item-icon">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0
                 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4
                 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112
                 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z"
              clip-rule="evenodd"/>
          </svg>
        </div>
        <span class="nav-item-label">Products</span>
        <div class="nav-item-arrow">
          <svg viewBox="0 0 12 12" fill="none">
            <path d="M4 5l2 2 2-2" stroke="currentColor"
                  stroke-width="1.2" stroke-linecap="round"
                  stroke-linejoin="round"/>
          </svg>
        </div>
      </a>

      <a routerLink="customers"
         routerLinkActive="active"
         class="nav-item"
         (click)="sidebarOpen = false">
        <div class="nav-item-icon">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6
                     0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97
                     6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5
                     5 0 015 5v1H1v-1a5 5 0 015-5z"/>
          </svg>
        </div>
        <span class="nav-item-label">Customers</span>
        <div class="nav-item-arrow">
          <svg viewBox="0 0 12 12" fill="none">
            <path d="M4 5l2 2 2-2" stroke="currentColor"
                  stroke-width="1.2" stroke-linecap="round"
                  stroke-linejoin="round"/>
          </svg>
        </div>
      </a>

      <a routerLink="orders"
         routerLinkActive="active"
         class="nav-item"
         (click)="sidebarOpen = false">
        <div class="nav-item-icon">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2
                 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0
                 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z"
              clip-rule="evenodd"/>
          </svg>
        </div>
        <span class="nav-item-label">Orders</span>
        <div class="nav-item-arrow">
          <svg viewBox="0 0 12 12" fill="none">
            <path d="M4 5l2 2 2-2" stroke="currentColor"
                  stroke-width="1.2" stroke-linecap="round"
                  stroke-linejoin="round"/>
          </svg>
        </div>
      </a>

    </nav>

    <!-- Spacer -->
    <div class="nav-spacer"></div>

    <!-- Footer nav -->
    <p class="nav-label">Account</p>

    <div class="sidebar-footer">

      <a routerLink="/" class="nav-item nav-item-ghost"
         (click)="sidebarOpen = false">
        <div class="nav-item-icon">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0
                     001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0
                     001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0
                     001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0
                     001.414-1.414l-7-7z"/>
          </svg>
        </div>
        <span class="nav-item-label">Back to store</span>
      </a>

      <button class="nav-item nav-item-logout" (click)="onLogout()">
        <div class="nav-item-icon">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M13 7l3 3m0 0l-3 3m3-3H8m5-7H5a2 2 0 00-2
                     2v10a2 2 0 002 2h8"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-item-label">Logout</span>
      </button>

    </div>

    <!-- Sidebar glow -->
    <div class="sidebar-glow" aria-hidden="true"></div>

  </aside>

  <!-- ── Main content ────────────────────────────────── -->
  <div class="admin-body">

    <!-- Top bar (mobile + desktop) -->
    <header class="admin-topbar">

      <!-- Mobile hamburger -->
      <button class="hamburger" (click)="sidebarOpen = !sidebarOpen"
              aria-label="Open menu">
        <svg viewBox="0 0 20 20" fill="currentColor" class="ham-icon">
          <path fill-rule="evenodd"
            d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0
               5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1
               1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
            clip-rule="evenodd"/>
        </svg>
      </button>

      <!-- Breadcrumb / page title -->
      <div class="topbar-title">
        <span class="topbar-brand">Admin</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-page">Dashboard</span>
      </div>

      <!-- Right actions -->
      <div class="topbar-right">
        <a routerLink="/" class="topbar-store-link">
          <svg viewBox="0 0 16 16" fill="none" class="store-icon">
            <path d="M8 1L1 6v9h4v-5h6v5h4V6L8 1z"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>View store</span>
        </a>
        <button class="topbar-logout" (click)="onLogout()">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M10 5l3 3m0 0l-3 3m3-3H6m4-5H4a1 1 0 00-1
                     1v8a1 1 0 001 1h6"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </header>

    <!-- Router outlet -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
