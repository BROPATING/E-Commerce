<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    <div *ngIf="lockedMessage" class="alert alert-error">
      {{ lockedMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="email.invalid && email.touched"
        />
        <span class="error-msg" *ngIf="email.invalid && email.touched">
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Your password"
          [class.input-error]="password.invalid && password.touched"
        />
        <span class="error-msg" *ngIf="password.invalid && password.touched">
          Password is required
        </span>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

    </form>

    <div class="auth-links">
      <a routerLink="/auth/forgot-password">Forgot password?</a>
      <span>·</span>
      <a routerLink="/auth/register">Create account</a>
    </div>
  </div>
</div>
