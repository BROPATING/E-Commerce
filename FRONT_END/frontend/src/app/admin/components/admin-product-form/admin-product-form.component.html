<div class="form-page">
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h1>
    <a routerLink="/admin/products" class="btn btn-secondary">← Cancel</a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-grid">
        <div class="form-group">
          <label>Product name</label>
          <input type="text" formControlName="name"
            [class.input-error]="form.get('name')!.invalid && form.get('name')!.touched"/>
          <span class="error-msg"
            *ngIf="form.get('name')!.invalid && form.get('name')!.touched">
            Name is required
          </span>
        </div>

        <div class="form-group">
          <label>Sub-category</label>
          <select formControlName="subCategoryId"
            [class.input-error]="form.get('subCategoryId')!.invalid && form.get('subCategoryId')!.touched">
            <option value="">Select sub-category</option>
            <option *ngFor="let sub of allSubCategories" [value]="sub.id">
              {{ sub.label }}
            </option>
          </select>
          <span class="error-msg"
            *ngIf="form.get('subCategoryId')!.invalid && form.get('subCategoryId')!.touched">
            Sub-category is required
          </span>
        </div>

        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" formControlName="price" min="0" step="0.01"
            [class.input-error]="form.get('price')!.invalid && form.get('price')!.touched"/>
          <span class="error-msg"
            *ngIf="form.get('price')!.invalid && form.get('price')!.touched">
            Valid price is required
          </span>
        </div>

        <div class="form-group">
          <label>Stock quantity</label>
          <input type="number" formControlName="stock" min="0"
            [class.input-error]="form.get('stock')!.invalid && form.get('stock')!.touched"/>
          <span class="error-msg"
            *ngIf="form.get('stock')!.invalid && form.get('stock')!.touched">
            Stock is required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="4"
          [class.input-error]="form.get('description')!.invalid && form.get('description')!.touched">
        </textarea>
        <span class="error-msg"
          *ngIf="form.get('description')!.invalid && form.get('description')!.touched">
          Description is required
        </span>
      </div>

      <!-- Image Upload -->
      <div class="form-group">
        <label>Product image (optional)</label>
        <div class="image-upload-area">
          <img
            *ngIf="previewUrl"
            [src]="previewUrl"
            class="image-preview"
            alt="Preview"
          />
          <div *ngIf="!previewUrl" class="image-placeholder">
            No image selected
          </div>
          <label class="file-label">
            {{ previewUrl ? 'Change image' : 'Upload image' }}
            <input
              type="file"
              accept="image/*"
              (change)="onFileChange($event)"
              style="display: none"
            />
          </label>
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : (isEditMode ? 'Update product' : 'Create product') }}
        </button>
      </div>

    </form>
  </div>
</div>
