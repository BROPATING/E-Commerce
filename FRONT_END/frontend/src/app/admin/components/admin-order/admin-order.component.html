<div class="admin-section">
  <div class="section-header">
    <h1>All Orders</h1>
    <span class="order-count" *ngIf="!loading">
      {{ orders.length }} total
    </span>
  </div>

  <div *ngIf="loading" class="loading-state">Loading orders...</div>

  <div *ngIf="!loading" class="orders-list">
    <div *ngFor="let order of orders" class="order-row">
      
      <div class="order-summary" (click)="viewOrder(order.id)">
        <div class="order-left">
          <span class="order-id">Order #{{ order.id }}</span>
          <span class="order-customer">
            {{ order.user?.name }} ({{ order.user?.email }})
          </span>
        </div>
        <div class="order-right">
          <span class="order-date">{{ order.createdAt | date:'mediumDate' }}</span>
          <span class="order-payment">{{ order.paymentMethod }}</span>
          <span class="order-total">₹{{ order.totalAmount | number:'1.2-2' }}</span>
          <span class="view-link">View Details →</span>
        </div>
      </div>

    </div>
  </div>
</div>
